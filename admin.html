<!DOCTYPE html>
<html>
<head>
    <title>🔑 Ashot Key Generator</title>
    <style>
        body { background: #0a0a14; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 40px; }
        .container { max-width: 600px; width: 100%; }
        .card { background: rgba(20,20,35,0.9); border-radius: 16px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: #4dff88; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
        input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }
        button { padding: 12px 24px; background: #4dff88; color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .key-display { background: rgba(77,255,136,0.1); border: 1px solid rgba(77,255,136,0.2); border-radius: 8px; padding: 16px; text-align: center; font-size: 24px; font-family: monospace; color: #4dff88; margin: 16px 0; }
        .info { color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; }
        .result { margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔑 Ashot Key Generator</h1>
            <p style="text-align:center;color:rgba(255,255,255,0.4);font-size:13px;">Generate license keys for Ashot bots</p>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" value="Ashot" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Duration (hours)</label>
                <input type="number" id="hours" value="24" min="1" max="8760">
            </div>
            <button onclick="generateKey()">Generate Key</button>
            <div id="result" class="result"></div>
            
            <hr style="border-color:rgba(255,255,255,0.05);margin:20px 0;">
            
            <div class="form-group">
                <label>Validate a key</label>
                <input type="text" id="validate-key" placeholder="Enter key to validate">
            </div>
            <button onclick="validateKey()" style="background:rgba(255,255,255,0.1);color:#fff;">Validate</button>
            <div id="validate-result" class="result"></div>
            
            <hr style="border-color:rgba(255,255,255,0.05);margin:20px 0;">
            
            <button onclick="downloadKeys()" style="background:rgba(255,255,255,0.05);color:#fff;width:100%;">📥 Download keys.json</button>
            <div style="margin-top:8px;">
                <input type="file" id="uploadKeys" accept=".json" style="display:none;" onchange="uploadKeys(event)">
                <button onclick="document.getElementById('uploadKeys').click()" style="background:rgba(255,255,255,0.05);color:#fff;width:100%;">📤 Upload keys.json</button>
            </div>
        </div>
    </div>

    <script>
        // KeySystem
        let keys = JSON.parse(localStorage.getItem('ashot_keys_admin') || '{}');

        function saveKeys() {
            localStorage.setItem('ashot_keys_admin', JSON.stringify(keys));
        }

        function generateKeyString(username) {
            const random = Math.random().toString(36).substring(2, 10);
            const timestamp = Date.now().toString(36);
            let hash = 0;
            for (let i = 0; i < (username + random + timestamp).length; i++) {
                const char = (username + random + timestamp).charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return `${username.substring(0, 4)}${Math.abs(hash).toString(36).substring(0, 8)}`.toUpperCase();
        }

        function generateKey() {
            const username = document.getElementById('username').value.trim() || 'user';
            const hours = parseInt(document.getElementById('hours').value) || 24;
            const key = generateKeyString(username);
            const expiry = Math.floor(Date.now() / 1000) + (hours * 3600);
            
            keys[key] = {
                username: username,
                expiry: expiry,
                created: Math.floor(Date.now() / 1000),
                duration: hours
            };
            saveKeys();

            document.getElementById('result').innerHTML = `
                <div class="key-display">${key}</div>
                <div class="info">
                    👤 ${username} • ⏱ ${hours}h • 📅 ${new Date(expiry * 1000).toLocaleString()}
                </div>
                <button onclick="navigator.clipboard.writeText('${key}')" style="margin-top:8px;background:rgba(255,255,255,0.05);color:#fff;width:100%;">📋 Copy Key</button>
                <button onclick="downloadKeys()" style="margin-top:4px;background:rgba(77,255,136,0.1);color:#4dff88;width:100%;">📥 Download keys.json</button>
            `;
        }

        function validateKey() {
            const key = document.getElementById('validate-key').value.trim().toUpperCase();
            const now = Math.floor(Date.now() / 1000);
            const data = keys[key];
            
            if (!data) {
                document.getElementById('validate-result').innerHTML = '<div style="color:#ff4444;">❌ Key not found</div>';
            } else if (data.expiry < now) {
                document.getElementById('validate-result').innerHTML = '<div style="color:#ff4444;">❌ Key expired</div>';
            } else {
                document.getElementById('validate-result').innerHTML = `
                    <div style="color:#4dff88;">✅ Valid key</div>
                    <div style="color:rgba(255,255,255,0.5);font-size:13px;">
                        👤 ${data.username} • 📅 ${new Date(data.expiry * 1000).toLocaleString()}
                    </div>
                `;
            }
        }

        function downloadKeys() {
            const blob = new Blob([JSON.stringify(keys, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'keys.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function uploadKeys(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    keys = JSON.parse(e.target.result);
                    saveKeys();
                    alert('✅ Keys imported successfully!');
                } catch(err) {
                    alert('❌ Invalid JSON file');
                }
            };
            reader.readAsText(file);
        }

        // Expose functions
        window.generateKey = generateKey;
        window.validateKey = validateKey;
        window.downloadKeys = downloadKeys;
        window.uploadKeys = uploadKeys;
    </script>
</body>
</html>
