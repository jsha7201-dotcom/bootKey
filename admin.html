<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Ashot Keys</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Admin Panel</h1>
            <p>Manage all keys and users</p>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="main-card">
            <h2>Admin Login</h2>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="admin-pass" placeholder="Enter admin password">
            </div>
            <button onclick="adminLogin()" class="btn btn-primary">Login</button>
            <div id="login-error" class="error-msg"></div>
        </div>

        <!-- Admin Panel (hidden by default) -->
        <div id="admin-panel" class="main-card" style="display:none;">
            <div class="admin-stats">
                <div class="stat-box">
                    <h3 id="stat-total">0</h3>
                    <p>Total Keys</p>
                </div>
                <div class="stat-box">
                    <h3 id="stat-active">0</h3>
                    <p>Active Keys</p>
                </div>
                <div class="stat-box">
                    <h3 id="stat-expired">0</h3>
                    <p>Expired</p>
                </div>
            </div>

            <div class="admin-actions">
                <div class="form-group">
                    <label>Bulk Generate (username prefix)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="bulk-prefix" placeholder="Prefix" style="flex:1;">
                        <input type="number" id="bulk-count" value="5" min="1" max="100" style="width:80px;">
                        <input type="number" id="bulk-hours" value="24" min="1" max="8760" style="width:80px;">
                        <button onclick="bulkGenerate()" class="btn btn-primary">Generate</button>
                    </div>
                </div>
                <button onclick="exportKeys()" class="btn btn-secondary">📤 Export JSON</button>
                <button onclick="importKeys()" class="btn btn-secondary">📥 Import JSON</button>
                <button onclick="clearAllKeys()" class="btn btn-danger">🗑️ Clear All</button>
            </div>

            <div class="admin-list">
                <h3>All Keys</h3>
                <table id="admin-keys-table">
                    <thead>
                        <tr>
                            <th>Key</th>
                            <th>Username</th>
                            <th>Created</th>
                            <th>Expires</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="admin-keys-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
